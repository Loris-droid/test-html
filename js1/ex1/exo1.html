<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"> 
  <title>Exo 1 : Stage de remise en forme</title>
</head>
<body>
<a href="/index.html" class="bouton">
  <img src="/test-html/maison.png" alt="Retour à l'accueil">
</a>
<h1 id="titre"> Mon super site </h1>
  <img src="logoJS.png" class="images" alt="Logo JavaScript" />
  <p class="intro">Bonjour et bienvenue sur mon site !   </p>
  <p class="intro">J'ai un site très intéressant</p>
  <p>Pour le moment, mon site est un peu vide.</p>
  <p><a href="https://fr.wikipedia.org/wiki/JavaScript">Le Wiki du JS</a></p>
  <script> //C'est ici que l'on écrira le code JS
  let introduction = document.getElementsByClassName('intro');
for (let le_texte of introduction) {
  le_texte.style.textAlign = 'right';
}
let parag = document.getElementsByTagName('p');
for (let i = 0; i < parag.length; i++) {
  parag[i].style.color = 'red';
}
document.querySelector('.intro').style.color = 'purple';
let titre = document.getElementById('titre');
document.getElementById('titre').innerHTML = "Le Javascript";
titre.style.color = "blue";
titre.style.textAlign = 'center';
  </script>
</body>
</html>
